<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #1a1a1a 0%, #2c2c2c 100%);
      font-family: 'Courier New', Courier, monospace;
    }
    .modal {
      display: none;
      background: rgba(0, 0, 0, 0.8);
    }
    .modal.show {
      display: flex;
    }
    .skeleton-board {
      background: transparent;
      border: 2px solid #00ff88;
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
    }
    .skeleton-board button {
      border: 1px solid #00ff88;
      background: transparent;
      color: #00ff88;
      transition: all 0.2s ease;
    }
    .skeleton-board button:hover {
      background: rgba(0, 255, 136, 0.1);
      box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    }
    .neon-text {
      text-shadow: 0 0 5px rgba(0, 255, 136, 0.8), 0 0 10px rgba(0, 255, 136, 0.4);
    }
    .neon-button {
      box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    }
    footer a:hover {
      color: #00ff88;
      text-shadow: 0 0 5px rgba(0, 255, 136, 0.8);
    }
  </style>
</head>
<body class="flex flex-col items-center justify-between min-h-screen text-white">
  <div class="bg-black bg-opacity-80 p-8 rounded-2xl shadow-2xl w-full max-w-md mt-8">
    <h1 class="text-4xl font-extrabold text-center mb-6 text-green-400 neon-text">Tic-Tac-Toe</h1>
    
    <!-- Score Tracker -->
    <div class="flex justify-between mb-4">
      <div class="text-lg font-semibold">Player X: <span id="scoreX" class="text-green-400">0</span></div>
      <div class="text-lg font-semibold">Player O: <span id="scoreO" class="text-green-400">0</span></div>
    </div>
    
    <!-- Turn Indicator -->
    <div id="status" class="text-xl font-medium text-center mb-6 text-gray-300 neon-text">Player X's Turn</div>
    
    <!-- Game Board -->
    <div id="board" class="grid grid-cols-3 gap-2 w-full skeleton-board">
      <button class="h-24 text-5xl font-bold rounded-lg hover:bg-opacity-10 transition" onclick="makeMove(0)"></button>
      <button class="h-24 text-5xl font-bold rounded-lg hover:bg-opacity-10 transition" onclick="makeMove(1)"></button>
      <button class="h-24 text-5xl font-bold rounded-lg hover:bg-opacity-10 transition" onclick="makeMove(2)"></button>
      <button class="h-24 text-5xl font-bold rounded-lg hover:bg-opacity-10 transition" onclick="makeMove(3)"></button>
      <button class="h-24 text-5xl font-bold rounded-lg hover:bg-opacity-10 transition" onclick="makeMove(4)"></button>
      <button class="h-24 text-5xl font-bold rounded-lg hover:bg-opacity-10 transition" onclick="makeMove(5)"></button>
      <button class="h-24 text-5xl font-bold rounded-lg hover:bg-opacity-10 transition" onclick="makeMove(6)"></button>
      <button class="h-24 text-5xl font-bold rounded-lg hover:bg-opacity-10 transition" onclick="makeMove(7)"></button>
      <button class="h-24 text-5xl font-bold rounded-lg hover:bg-opacity-10 transition" onclick="makeMove(8)"></button>
    </div>
    
    <!-- Restart Button -->
    <button id="restart" class="mt-6 w-full px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-semibold neon-button" onclick="restartGame()">Restart Game</button>
    
    <!-- Modal for Game Result -->
    <div id="modal" class="modal fixed inset-0 items-center justify-center">
      <div class="bg-black bg-opacity-90 p-6 rounded-lg shadow-xl text-center max-w-sm w-full">
        <h2 id="modalMessage" class="text-2xl font-bold mb-4 text-green-400 neon-text"></h2>
        <button class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition neon-button" onclick="closeModal()">Play Again</button>
      </div>
    </div>
  </div>

  <!-- Developer Details and Social Links -->
  <footer class="bg-black bg-opacity-80 w-full py-4 text-center text-gray-400">
    <p class="text-sm">Developed by Kalyan N | Full-Stack Developer</p>
    <p class="text-sm mb-2">Built with HTML, Tailwind CSS, and JavaScript</p>

      </a>
    </div>
  </footer>

  <script>
    let currentPlayer = 'X';
    let board = ['', '', '', '', '', '', '', '', ''];
    let gameActive = true;
    let scores = { X: 0, O: 0 };

    function makeMove(index) {
      if (board[index] === '' && gameActive) {
        board[index] = currentPlayer;
        document.getElementById('board').children[index].textContent = currentPlayer;
        if (checkWin()) {
          scores[currentPlayer]++;
          document.getElementById(score${currentPlayer}).textContent = scores[currentPlayer];
          showModal(Player ${currentPlayer} Wins!);
          gameActive = false;
        } else if (board.every(cell => cell !== '')) {
          showModal("It's a Draw!");
          gameActive = false;
        } else {
          currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
          document.getElementById('status').textContent = Player ${currentPlayer}'s Turn;
        }
      }
    }

    function checkWin() {
      const winPatterns = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
        [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
        [0, 4, 8], [2, 4, 6] // Diagonals
      ];
      return winPatterns.some(pattern => 
        pattern.every(index => board[index] === currentPlayer)
      );
    }

    function restartGame() {
      board = ['', '', '', '', '', '', '', '', ''];
      currentPlayer = 'X';
      gameActive = true;
      document.getElementById('status').textContent = Player ${currentPlayer}'s Turn;
      Array.from(document.getElementById('board').children).forEach(button => {
        button.textContent = '';
      });
      closeModal();
    }

    function showModal(message) {
      document.getElementById('modalMessage').textContent = message;
      document.getElementById('modal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
      restartGame();
    }
  </script>
</body>
</html>
